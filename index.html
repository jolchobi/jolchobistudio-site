<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#111827;
      color:white;
      text-align:center;
    }

    .hero{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    h1{
      font-size:3rem;
      margin-bottom:15px;
    }

    p{
      font-size:1.2rem;
      color:#d1d5db;
      margin-bottom:25px;
    }

    .btn{
      display:inline-block;
      padding:12px 24px;
      background:#2563eb;
      color:white;
      text-decoration:none;
      border-radius:8px;
      transition:.3s;
    }

    .btn:hover{
      background:#1d4ed8;
    }
  </style>
</head>
<body>

  <section class="hero">
    <h1>Hello, I'm Your Name</h1>
    <p>This website is successfully deployed on Vercel.</p>
    <a href="#" class="btn">Contact Me</a>
  </section>

</body>
</html>
